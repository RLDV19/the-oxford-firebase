<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Oxford School Portal</title>
    
    <!-- React & ReactDOM (development for better error messages) -->
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase v9 modular SDK via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, writeBatch, query } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        
        // Expose to window for the script
        window.firebase = { initializeApp };
        window.FirebaseAuth = { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged };
        window.FirebaseFirestore = { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, writeBatch, query };
    </script>
    
    <!-- Preload Dependencies for PDF/Image Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Configuration Injection -->
    <script>
        window.__firebase_config = JSON.stringify({
          apiKey: "AIzaSyAmekG_W6a96pTJZ86fuwW1lWogmR9yV1I",
          authDomain: "the-oxford-project.firebaseapp.com",
          projectId: "the-oxford-project",
          storageBucket: "the-oxford-project.firebasestorage.app",
          messagingSenderId: "668485042428",
          appId: "1:668485042428:web:8037757e74836ec40e9779",
          measurementId: "G-9QWCTGX9T0"
        });
        window.__app_id = 'the-oxford-project';
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Polyfill to make lucide icons compatible with React
        window.LucideReactShim = {};
        
        // Helper to convert kebab-case to PascalCase
        const toPascalCase = (str) => 
            str.replace(/(^\w|-\w)/g, (m) => m.replace('-', '').toUpperCase());

        if (window.lucide && window.lucide.icons) {
            Object.keys(window.lucide.icons).forEach(key => {
                const iconName = toPascalCase(key);
                // Assign to Shim (e.g. Trash2)
                window.LucideReactShim[iconName] = (props) => {
                    const { color = 'currentColor', size = 24, strokeWidth = 2, className, ...rest } = props;
                    const iconData = window.lucide.icons[key];
                    return React.createElement('svg', {
                        xmlns: "http://www.w3.org/2000/svg",
                        width: size,
                        height: size,
                        viewBox: "0 0 24 24",
                        fill: "none",
                        stroke: color,
                        strokeWidth: strokeWidth,
                        strokeLinecap: "round",
                        strokeLinejoin: "round",
                        className: `lucide lucide-${key} ${className || ''}`,
                        ...rest,
                        dangerouslySetInnerHTML: { __html: iconData.map(child => {
                            const [tag, attrs] = child;
                            const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                            return `<${tag} ${attrStr} />`;
                        }).join('') }
                    });
                };
                // Assign original key too just in case
                window.LucideReactShim[key] = window.LucideReactShim[iconName];
            });
        }
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");
        
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        .print-full-height {
            min-height: 1123px;
        }
        
        @media print {
            body { margin: 0; padding: 0; }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print-full-height { height: 1123px; min-height: 1123px; max-height: 1123px; }
        }
        
        .no-pdf { /* This class will be hidden during PDF generation */ }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" src="script.js?v=2"></script>
</body>
</html>
